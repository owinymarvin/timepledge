services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    expose:
      - "8000"
    command: ["fastapi", "dev", "app_backend.py", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    expose:
      - "8501"
    command: ["streamlit", "run", "app_frontend.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
